name: Tests

on: [push, pull_request]

jobs:
  Run tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull backend image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/clapp_backend:latest

      - name: Start Django backend
        run: |
          docker run -d \
            --name django-backend \
            -p 8000:8000 \
            -e DJANGO_SETTINGS_MODULE=conf.settings.test \
            --entrypoint /bin/bash \
            ${{ secrets.DOCKER_USERNAME }}/clapp_backend:latest \
            -c "python manage.py create_test_user && python manage.py runserver 0.0.0.0:8000"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Show Django logs on failure
        if: failure()
        run: docker logs django-backend
